# ConverseSpine — production bot Worker
# CRM: NayaDesk (service binding). Spine: deterministic turn contract.

name = "converse-spine"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
LOG_LEVEL = "info"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
DEEPSEEK_MODEL = "deepseek-chat"
DEFAULT_BUILDER_ID = "lokations"
ADVISOR_BUILDER_ID = "naya-advisor"
LANGFUSE_BASE_URL = "https://cloud.langfuse.com"

[[vectorize]]
binding = "INTENT_VECTORS"
index_name = "naya-intent-phrasings"

[[vectorize]]
binding = "PROJECT_VECTORS"
index_name = "naya-project-names"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "TURN_CACHE"
id = "66ef723ea8614317b80aac74b77f03d1"
preview_id = "66ef723ea8614317b80aac74b77f03d1"

[[durable_objects.bindings]]
name = "TURN_DEBOUNCER"
class_name = "TurnDebouncer"

[[migrations]]
tag = "v1"
new_classes = ["TurnDebouncer"]

# ── Local dev (wrangler dev) ───────────────────────────────────────────
[env.dev]
name = "converse-spine-dev"
remote = true

# Deployed dev: NAYADESK service binding (avoids CF error 1042 on worker→worker HTTP).
# Local wrangler dev: remote = true → hits nayadesk-dev on Cloudflare (not local sim).
[[env.dev.services]]
binding = "NAYADESK"
service = "nayadesk-dev"
remote = true

[[env.dev.kv_namespaces]]
binding = "TURN_CACHE"
id = "66ef723ea8614317b80aac74b77f03d1"
preview_id = "66ef723ea8614317b80aac74b77f03d1"
remote = true

[env.dev.vars]
NAYADESK_URL = "https://nayadesk-dev.nagarjun-arjun.workers.dev"
ADVISOR_BUILDER_ID = "naya-advisor"
LOG_LEVEL = "info"
LOCAL_TURN_LOG = "on"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
DEEPSEEK_MODEL = "deepseek-chat"
DEFAULT_BUILDER_ID = "lokations"
LANGFUSE_BASE_URL = "https://cloud.langfuse.com"
# SIL data pipeline — weekly intent-index rebuild from the git registry.
# Model is a config: the bake-off decides it; default = current, so no change
# until a model is chosen. Registry URL is the raw JSONL (raster to R2 later).
SIL_EMBED_MODEL = "@cf/baai/bge-base-en-v1.5"
SIL_REGISTRY_URL = "https://raw.githubusercontent.com/nagarjunveerapu/ConverseSpine/main/corpus/intent-registry.jsonl"
# Master switch for the canonical intent-embed schema (entity-masked corpus +
# query in lockstep, ships the v2 + mined corpus). "false" = legacy raw (rebuild
# stays a no-op today). Flip to "true" only WITH a manifest-reset full rebuild.
SIL_CANONICAL_EMBED = "false"
# Understanding Flywheel Wave A — every turn feeds Desk's review queue so the
# /operations/understanding board sees real traffic. Dev-only until the board
# has soaked; prod omits the var (= off, zero behaviour change).
UNDERSTANDING_CAPTURE = "true"
SIL_EVAL_ENABLED = "true"
# Wave C overnight auto-teach — gate-checked self-promotion. Requires canonical
# mode; flip to "true" AFTER the SIL_CANONICAL_EMBED cutover has soaked.
UNDERSTANDING_AUTO_TEACH = "false"

# Weekly rebuild — Mondays 03:30 UTC. Nightly 22:30 UTC (04:00 IST) = Wave C
# auto-teach (runs after Desk's 18:00 UTC sweep+teacher; no-op unless
# UNDERSTANDING_AUTO_TEACH=true).
[env.dev.triggers]
crons = ["30 3 * * 1", "30 22 * * *"]
BAML_EXTRACT_MODE = "promote"

[[env.dev.durable_objects.bindings]]
name = "TURN_DEBOUNCER"
class_name = "TurnDebouncer"

[[env.dev.vectorize]]
binding = "INTENT_VECTORS"
# SIL Phase 0 — dev must bind the seeded dev index (13,555 phrasings), not the
# empty prod-named one. The missing -dev suffix kept the intent layer dead.
index_name = "naya-intent-phrasings-dev"
remote = true

[[env.dev.vectorize]]
binding = "PROJECT_VECTORS"
index_name = "naya-project-names-dev"
remote = true

[env.dev.ai]
binding = "AI"
remote = true

# ── Production ─────────────────────────────────────────────────────────
[env.prod]
name = "converse-spine"

[[env.prod.kv_namespaces]]
binding = "TURN_CACHE"
id = "53df7275a01b4527a3421e36d7586864"

[[env.prod.services]]
binding = "NAYADESK"
service = "nayadesk"

[[env.prod.durable_objects.bindings]]
name = "TURN_DEBOUNCER"
class_name = "TurnDebouncer"

[[env.prod.vectorize]]
binding = "INTENT_VECTORS"
index_name = "naya-intent-phrasings"

[[env.prod.vectorize]]
binding = "PROJECT_VECTORS"
index_name = "naya-project-names"

[env.prod.ai]
binding = "AI"

[env.prod.vars]
LOG_LEVEL = "info"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
DEEPSEEK_MODEL = "deepseek-chat"
DEFAULT_BUILDER_ID = "lokations"
ADVISOR_BUILDER_ID = "naya-advisor"
LANGFUSE_BASE_URL = "https://cloud.langfuse.com"
