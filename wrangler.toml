# ConverseSpine — production bot Worker
# CRM: NayaDesk (service binding). Spine: deterministic turn contract.

name = "converse-spine"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
LOG_LEVEL = "info"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
DEEPSEEK_MODEL = "deepseek-chat"
DEFAULT_BUILDER_ID = "lokations"
ADVISOR_BUILDER_ID = "naya-advisor"
LANGFUSE_BASE_URL = "https://cloud.langfuse.com"

[[vectorize]]
binding = "INTENT_VECTORS"
index_name = "naya-intent-phrasings"

[[vectorize]]
binding = "PROJECT_VECTORS"
index_name = "naya-project-names"

[[vectorize]]
binding = "EDUCATION_VECTORS"
index_name = "naya-buyer-education"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "TURN_CACHE"
id = "66ef723ea8614317b80aac74b77f03d1"
preview_id = "66ef723ea8614317b80aac74b77f03d1"

[[durable_objects.bindings]]
name = "TURN_DEBOUNCER"
class_name = "TurnDebouncer"

[[migrations]]
tag = "v1"
new_classes = ["TurnDebouncer"]

# ── Local dev (wrangler dev) ───────────────────────────────────────────
[env.dev]
name = "converse-spine-dev"
remote = true

# Deployed dev: NAYADESK service binding (avoids CF error 1042 on worker→worker HTTP).
# Local wrangler dev: remote = true → hits nayadesk-dev on Cloudflare (not local sim).
[[env.dev.services]]
binding = "NAYADESK"
service = "nayadesk-dev"
remote = true

[[env.dev.kv_namespaces]]
binding = "TURN_CACHE"
id = "66ef723ea8614317b80aac74b77f03d1"
preview_id = "66ef723ea8614317b80aac74b77f03d1"
remote = true

[env.dev.vars]
NAYADESK_URL = "https://nayadesk-dev.nagarjun-arjun.workers.dev"
ADVISOR_BUILDER_ID = "naya-advisor"
LOG_LEVEL = "info"
LOCAL_TURN_LOG = "on"
# Failure-as-a-value Phase 0: additive shadow ledger/log records only.
FAILURE_LOG = "true"
# Failure-as-a-value Phase 1: EMI authority + destructive-intent disambiguation.
FAILURE_TOOLS = "true"
# Failure-as-a-value Phase 2: embedding-routed policy and definition outcomes.
FAILURE_ROUTING = "true"
# Failure-as-a-value Phase 3: geography authority + non-persistent relaxation.
FAILURE_SEARCH = "true"
# Failure-as-a-value Phase 4: required facts + partial no-data outcomes.
FAILURE_ANSWER = "true"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
DEEPSEEK_MODEL = "deepseek-chat"
DEFAULT_BUILDER_ID = "lokations"
LANGFUSE_BASE_URL = "https://cloud.langfuse.com"
# SIL data pipeline — weekly intent-index rebuild from the git registry.
# Model is a config: the bake-off decides it; default = current, so no change
# until a model is chosen. Registry URL is the raw JSONL (raster to R2 later).
SIL_EMBED_MODEL = "@cf/baai/bge-base-en-v1.5"
SIL_REGISTRY_URL = "https://raw.githubusercontent.com/nagarjunveerapu/ConverseSpine/main/corpus/intent-registry.jsonl"
# Master switch for the canonical intent-embed schema (entity-masked corpus +
# query in lockstep, ships the v2 + mined corpus). "false" = legacy raw (rebuild
# stays a no-op today). Flip to "true" only WITH a manifest-reset full rebuild.
SIL_CANONICAL_EMBED = "false"
# Understanding Flywheel Wave A — every turn feeds Desk's review queue so the
# /operations/understanding board sees real traffic. Dev-only until the board
# has soaked; prod omits the var (= off, zero behaviour change).
UNDERSTANDING_CAPTURE = "true"
SIL_EVAL_ENABLED = "true"
# Wave C overnight auto-teach — gate-checked self-promotion. Requires canonical
# mode; flip to "true" AFTER the SIL_CANONICAL_EMBED cutover has soaked.
UNDERSTANDING_AUTO_TEACH = "false"
# ── Embeddings-first, on dev ──────────────────────────────────────────────
# The learned metric (256x768 fitted on the labelled corpus) and the inverted
# ladder: state-dependent rules only, then the embedding, then regex as the
# fallback that catches what it declines. Both measured before flipping —
# see PRs #115/#116/#117. Prod stays on the raw model and the old order until
# its vector indexes are filled and this has soaked.
SIL_INTENT_PROJECTION = "p256-f6665e0b79"
SIL_EMBED_FIRST = "true"

# Weekly rebuild — Mondays 03:30 UTC. Nightly 22:30 UTC (04:00 IST) = Wave C
# auto-teach (runs after Desk's 18:00 UTC sweep+teacher; no-op unless
# UNDERSTANDING_AUTO_TEACH=true).
[env.dev.triggers]
crons = ["30 3 * * 1", "30 22 * * *"]
BAML_EXTRACT_MODE = "promote"

[[env.dev.durable_objects.bindings]]
name = "TURN_DEBOUNCER"
class_name = "TurnDebouncer"

[[env.dev.vectorize]]
binding = "INTENT_VECTORS"
# Dev now serves the LEARNED metric. This index is not a rebuild from the git
# registry — it is the previous dev index (naya-intent-phrasings-dev) with every
# vector multiplied by the projection, same ids and same metadata. Rebuilding
# from source would have dropped the ~3k Desk-taught and legacy rows whose text
# is not in the registry. See scripts/sil-project-existing-index.py.
#
# The name carries the projection id on purpose: tests/intent-projection-space
# fails the build if the configured index and SIL_INTENT_PROJECTION disagree.
index_name = "naya-intent-p256-f6665e0b79-full-dev"
remote = true

[[env.dev.vectorize]]
binding = "PROJECT_VECTORS"
index_name = "naya-project-names-dev"
remote = true

[[env.dev.vectorize]]
binding = "EDUCATION_VECTORS"
index_name = "naya-buyer-education-dev"
remote = true

[env.dev.ai]
binding = "AI"
remote = true

# ── Learned-metric A/B control (ctrldev) ───────────────────────────────
# The BASELINE arm. Raw-model vectors (no SIL_INTENT_PROJECTION) over an index
# holding EXACTLY the same 10,646 corpus rows as the projected arm.
#
# The existing dev index would have been the obvious control and the wrong one:
# it carries ~13.6k vectors from an older seeding, so a comparison against it
# would measure corpus drift as well as the metric. Same rows, same model, one
# variable.
[env.ctrldev]
name = "converse-spine-ctrldev"
remote = true

[[env.ctrldev.services]]
binding = "NAYADESK"
service = "nayadesk-dev"
remote = true

[[env.ctrldev.kv_namespaces]]
binding = "TURN_CACHE"
id = "66ef723ea8614317b80aac74b77f03d1"
preview_id = "66ef723ea8614317b80aac74b77f03d1"
remote = true

[[env.ctrldev.durable_objects.bindings]]
name = "TURN_DEBOUNCER"
class_name = "TurnDebouncer"

[[env.ctrldev.vectorize]]
binding = "INTENT_VECTORS"
index_name = "naya-intent-ident-ctrl-dev"
remote = true

[[env.ctrldev.vectorize]]
binding = "PROJECT_VECTORS"
index_name = "naya-project-names-dev"
remote = true

[env.ctrldev.ai]
binding = "AI"
remote = true

[env.ctrldev.vars]
NAYADESK_URL = "https://nayadesk-dev.nagarjun-arjun.workers.dev"
ADVISOR_BUILDER_ID = "naya-advisor"
LOG_LEVEL = "info"
LOCAL_TURN_LOG = "on"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
DEEPSEEK_MODEL = "deepseek-chat"
DEFAULT_BUILDER_ID = "lokations"
LANGFUSE_BASE_URL = "https://cloud.langfuse.com"
SIL_EMBED_MODEL = "@cf/baai/bge-base-en-v1.5"
SIL_REGISTRY_URL = "https://raw.githubusercontent.com/nagarjunveerapu/ConverseSpine/main/corpus/intent-registry.jsonl"
SIL_CANONICAL_EMBED = "false"
UNDERSTANDING_CAPTURE = "false"
SIL_EVAL_ENABLED = "true"
UNDERSTANDING_AUTO_TEACH = "false"
# Deliberately absent: SIL_INTENT_PROJECTION. This arm is the raw model.

# ── Learned-metric A/B (projdev) ───────────────────────────────────────
# Identical to dev in every respect EXCEPT the intent vector space: the learned
# projection is on, and INTENT_VECTORS points at the index built in that space.
# Running it as its own worker rather than flipping dev keeps the raw-model
# baseline live, so the two can be probed side by side with the same payloads
# instead of before/after a redeploy.
#
# The index name carries the projection id; tests/intent-projection-space.test.ts
# fails the build if these two ever disagree.
[env.projdev]
name = "converse-spine-projdev"
remote = true

[[env.projdev.services]]
binding = "NAYADESK"
service = "nayadesk-dev"
remote = true

[[env.projdev.kv_namespaces]]
binding = "TURN_CACHE"
id = "66ef723ea8614317b80aac74b77f03d1"
preview_id = "66ef723ea8614317b80aac74b77f03d1"
remote = true

[[env.projdev.durable_objects.bindings]]
name = "TURN_DEBOUNCER"
class_name = "TurnDebouncer"

[[env.projdev.vectorize]]
binding = "INTENT_VECTORS"
index_name = "naya-intent-p256-f6665e0b79-dev"
remote = true

[[env.projdev.vectorize]]
binding = "PROJECT_VECTORS"
index_name = "naya-project-names-dev"
remote = true

[env.projdev.ai]
binding = "AI"
remote = true

[env.projdev.vars]
NAYADESK_URL = "https://nayadesk-dev.nagarjun-arjun.workers.dev"
ADVISOR_BUILDER_ID = "naya-advisor"
LOG_LEVEL = "info"
LOCAL_TURN_LOG = "on"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
DEEPSEEK_MODEL = "deepseek-chat"
DEFAULT_BUILDER_ID = "lokations"
LANGFUSE_BASE_URL = "https://cloud.langfuse.com"
SIL_EMBED_MODEL = "@cf/baai/bge-base-en-v1.5"
SIL_REGISTRY_URL = "https://raw.githubusercontent.com/nagarjunveerapu/ConverseSpine/main/corpus/intent-registry.jsonl"
SIL_CANONICAL_EMBED = "false"
# Capture off here: this env exists to be measured, and its turns should not
# pour experimental traffic into Desk's understanding queue.
UNDERSTANDING_CAPTURE = "false"
SIL_EVAL_ENABLED = "true"
UNDERSTANDING_AUTO_TEACH = "false"
# The whole point of this env. Must match the bundled matrix's PROJECTION_ID;
# anything else (including a stale id) falls back to raw-model vectors.
SIL_INTENT_PROJECTION = "p256-f6665e0b79"
# Ladder order. "false" = historical (regex ladder pre-empts the embedding);
# "true" = state-dependent rules only, then the embedding, then regex as the
# fallback. Flipped per measurement run — see scripts/sil-ladder-ab.py.
SIL_EMBED_FIRST = "true"

# ── Production ─────────────────────────────────────────────────────────
[env.prod]
name = "converse-spine"

[[env.prod.kv_namespaces]]
binding = "TURN_CACHE"
id = "53df7275a01b4527a3421e36d7586864"

[[env.prod.services]]
binding = "NAYADESK"
service = "nayadesk"

[[env.prod.durable_objects.bindings]]
name = "TURN_DEBOUNCER"
class_name = "TurnDebouncer"

[[env.prod.vectorize]]
binding = "INTENT_VECTORS"
index_name = "naya-intent-phrasings"

[[env.prod.vectorize]]
binding = "PROJECT_VECTORS"
index_name = "naya-project-names"

[[env.prod.vectorize]]
binding = "EDUCATION_VECTORS"
index_name = "naya-buyer-education"

[env.prod.ai]
binding = "AI"

[env.prod.vars]
# Failure-as-a-value Phase 4 only — soaked ondev (carpet no_data, partial miss,
# price+cost sheet intact). Separate from Phases 0–3; wrangler var change needs redeploy to kill.
FAILURE_ANSWER = "true"
LOG_LEVEL = "info"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
DEEPSEEK_MODEL = "deepseek-chat"
DEFAULT_BUILDER_ID = "lokations"
ADVISOR_BUILDER_ID = "naya-advisor"
LANGFUSE_BASE_URL = "https://cloud.langfuse.com"
